<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tennis Matcher Berlin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { max-width: 560px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    label {
      font-size: 13px; font-weight: 600; color: #444;
      display: block; margin-bottom: 6px; margin-top: 16px;
    }
    input, select {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
    }
    .checkbox-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
    .checkbox-group label {
      font-weight: 400; display: flex; align-items: center; gap: 6px; margin: 0;
    }
    button.primary {
      margin-top: 24px; width: 100%; padding: 14px;
      background: #2d7a3a; color: white; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    button.primary:hover { background: #256032; }
    #results-section { display: none; }
    .section-title {
      font-size: 13px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;
    }
    .match-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 14px;
    }
    .match-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .match-info { flex: 1; }
    .match-name { font-size: 17px; font-weight: 700; }
    .match-meta { font-size: 13px; color: #777; margin-top: 2px; }
    .score-badge {
      font-size: 15px; font-weight: 700;
      background: #f0f9f2; color: #2d7a3a;
      border: 1px solid #b6e2be;
      border-radius: 20px; padding: 4px 12px;
      white-space: nowrap;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .tag { font-size: 12px; background: #f4f4f4; color: #555; border-radius: 6px; padding: 3px 9px; }
    .match-reason { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 14px; }
    button.msg-btn {
      background: #2d7a3a; color: white; border: none;
      border-radius: 8px; padding: 9px 18px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button.msg-btn:hover { background: #256032; }
    button.msg-btn.open { background: #eee; color: #333; }
    .chat-panel {
      display: none;
      margin-top: 16px;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }
    .chat-panel.visible { display: block; }
    .court-suggestion {
      background: #f8fdf9;
      border: 1px solid #c8e6c9;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .court-suggestion .court-label {
      font-weight: 600;
      color: #2d7a3a;
      margin-bottom: 6px;
    }
    .court-suggestion .powered {
      font-size: 11px;
      color: #aaa;
      margin-top: 6px;
    }
    .court-suggestion a { color: #2d7a3a; font-weight: 500; text-decoration: none; }
    .court-suggestion a:hover { text-decoration: underline; }
    .court-loading { font-size: 13px; color: #aaa; font-style: italic; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row textarea {
      flex: 1; border: 1px solid #ddd; border-radius: 8px;
      padding: 10px 12px; font-size: 14px; resize: none; height: 70px;
    }
    .chat-input-row button {
      background: #2d7a3a; color: white; border: none;
      border-radius: 8px; padding: 0 16px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .sent-msg {
      background: #2d7a3a; color: white;
      border-radius: 10px; padding: 10px 14px; font-size: 14px;
    }
    .sent-label { font-size: 12px; color: #aaa; margin-top: 6px; }
    .loading { text-align: center; color: #888; font-size: 14px; padding: 20px 0; display: none; }
  </style>
</head>
<body>
<div class="container">

  <div class="card">
    <h1>🎾 Tennis Matcher</h1>
    <p class="subtitle">Find your perfect match in Berlin</p>

    <label>Your name</label>
    <input type="text" id="name" placeholder="e.g. Lukas" />

    <label>Neighborhood</label>
    <input type="text" id="neighborhood" placeholder="e.g. Charlottenburg" />

    <label>Skill level (1.0 – 5.0)</label>
    <input type="number" id="level" min="1" max="5" step="0.5" placeholder="e.g. 3.5" />

    <label>Session duration (hours)</label>
    <select id="duration">
      <option value="1">1 hour</option>
      <option value="2" selected>2 hours</option>
    </select>

    <label>Preferred surfaces</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="clay" /> Clay</label>
      <label><input type="checkbox" value="hard court" /> Hard court</label>
      <label><input type="checkbox" value="grass" /> Grass</label>
    </div>

    <label>Available slot</label>
    <select id="slot">
      <option>Saturday 15:00</option>
      <option>Sunday 10:00</option>
      <option>Sunday 14:00</option>
    </select>

    <button class="primary" onclick="findMatch()">Find my match →</button>
  </div>

  <div class="loading" id="loading">⏳ Finding your matches...</div>

  <div id="results-section">
    <p class="section-title">Your matches</p>
    <div id="matches-list"></div>
  </div>

</div>

<script>
  const avatarColors = ["4CAF50", "2196F3", "9C27B0", "FF5722", "00BCD4"];
  let currentUser = null;

  function avatarUrl(name, index) {
    const color = avatarColors[index % avatarColors.length];
    const base = "https://ui-avatars.com/api/";
    return base + "?name=" + encodeURIComponent(name) + "&background=" + color + "&color=fff&size=52&bold=true&rounded=true";
  }

  function renderMatches(matches, user) {
    currentUser = user;
    const container = document.getElementById("matches-list");
    container.innerHTML = "";

    matches.forEach(function(m, i) {
      const card = document.createElement("div");
      card.className = "match-card";

      const prefilledMsg = "Hey " + m.name + "! I saw we matched on Tennis Matcher. Want to play " + m.available_slots[0] + "? I'm level " + user.level + " based in " + user.neighborhood + ". 🎾";

      const surfaceTags = m.surfaces.map(function(s) { return '<span class="tag">🎾 ' + s + '</span>'; }).join("");
      const slotTags = m.available_slots.map(function(s) { return '<span class="tag">🕐 ' + s + '</span>'; }).join("");

      card.innerHTML =
        '<div class="match-header">' +
          '<img class="avatar" src="' + avatarUrl(m.name, i) + '" alt="' + m.name + '" />' +
          '<div class="match-info">' +
            '<div class="match-name">' + m.name + '</div>' +
            '<div class="match-meta">📍 ' + m.neighborhood + ' &nbsp;·&nbsp; Level ' + m.level + '</div>' +
          '</div>' +
          '<div class="score-badge">' + m.match_score + '/10</div>' +
        '</div>' +
        '<div class="tags">' + surfaceTags + slotTags + '</div>' +
        '<div class="match-reason">' + m.reason + '</div>' +
        '<button class="msg-btn" data-name="' + m.name + '" data-neighborhood="' + m.neighborhood + '" data-index="' + i + '" onclick="toggleChat(this)">💬 Message ' + m.name + '</button>' +
        '<div class="chat-panel" id="panel-' + i + '">' +
          '<div class="court-suggestion" id="court-' + i + '">' +
            '<div class="court-loading">🔍 Finding the best court for you and ' + m.name + '...</div>' +
          '</div>' +
          '<div class="chat-input-row">' +
            '<textarea id="msg-' + i + '">' + prefilledMsg + '</textarea>' +
            '<button onclick="sendMessage(' + i + ', \'' + m.name + '\')">Send</button>' +
          '</div>' +
        '</div>';

      container.appendChild(card);
    });
  }

  async function loadCourt(index, neighborhoodA, neighborhoodB, matchName) {
    const courtDiv = document.getElementById("court-" + index);
    courtDiv.innerHTML = '<div class="court-loading">🔍 Deep-searching courts for you & ' + matchName + '...</div>';
    try {
      const res = await fetch("/court", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ neighborhood_a: neighborhoodA, neighborhood_b: neighborhoodB })
      });
      const data = await res.json();
      const courts = data.courts;

      if (!courts || courts.length === 0) {
        courtDiv.innerHTML = '<div class="court-label">📍 No courts found nearby</div>';
        return;
      }

      let html = '<div class="court-label">📍 Suggested courts for you & ' + matchName + '</div>';

      courts.forEach(function(c, i) {
        html += '<div style="background:#f8fdf9; border:1px solid #c8e6c9; border-radius:10px; padding:12px 14px; margin-bottom:10px;">';
        html += '<div style="font-weight:700; font-size:14px; margin-bottom:4px;">' + c.name + '</div>';
        if (c.area) {
          html += '<div style="font-size:12px; color:#888; margin-bottom:8px;">📍 ' + c.area + '</div>';
        }
        html += '<div style="font-size:13px; color:#333; margin-bottom:4px;">📌 <strong>How to book:</strong> ' + c.how_to_book + '</div>';
        if (c.hours) {
          html += '<div style="font-size:12px; color:#555; margin-bottom:4px;">🕐 <strong>Hours:</strong> ' + c.hours + '</div>';
        }
        if (c.price) {
          html += '<div style="font-size:12px; color:#555; margin-bottom:4px;">💶 <strong>Price:</strong> ' + c.price + '</div>';
        }
        if (c.notes) {
          html += '<div style="font-size:11px; color:#aaa; margin-top:4px;">' + c.notes + '</div>';
        }
        html += '</div>';
      });

      html += '<div style="font-size:11px; color:#bbb; margin-top:4px;">Found by Tavily · summarised by GPT-4o</div>';
      courtDiv.innerHTML = html;

    } catch (e) {
      courtDiv.innerHTML = '<div class="court-label">⚠️ Could not load court suggestions</div>';
    }
  }

  function toggleChat(btn) {
    const name = btn.getAttribute("data-name");
    const neighborhood = btn.getAttribute("data-neighborhood");
    const index = btn.getAttribute("data-index");
    const panel = document.getElementById("panel-" + index);
    const isOpen = panel.classList.contains("visible");

    panel.classList.toggle("visible", !isOpen);
    btn.textContent = isOpen ? "💬 Message " + name : "✕ Close";
    btn.classList.toggle("open", !isOpen);

    if (!isOpen && currentUser) {
      loadCourt(index, currentUser.neighborhood, neighborhood, name);
    }
  }

  function sendMessage(index, name) {
    const textarea = document.getElementById("msg-" + index);
    const msg = textarea.value.trim();
    if (!msg) return;
    const inputRow = textarea.parentElement;
    inputRow.innerHTML =
      '<div style="width:100%">' +
        '<div class="sent-msg">' + msg + '</div>' +
        '<div class="sent-label">✅ Message sent to ' + name + '</div>' +
      '</div>';
  }

  async function findMatch() {
    const name = document.getElementById("name").value.trim();
    const neighborhood = document.getElementById("neighborhood").value.trim();
    const level = document.getElementById("level").value.trim();
    const surfaces = Array.from(document.querySelectorAll(".checkbox-group input:checked")).map(function(el) { return el.value; });

    if (!name || !neighborhood || !level || surfaces.length === 0) {
      alert("Please fill in all fields and select at least one surface.");
      return;
    }

    const user = {
      name: name,
      neighborhood: neighborhood,
      level: parseFloat(level),
      session_duration_hours: parseInt(document.getElementById("duration").value),
      surfaces: surfaces,
      available_slots: [document.getElementById("slot").value]
    };

    document.getElementById("results-section").style.display = "none";
    document.getElementById("loading").style.display = "block";

    const res = await fetch("/match", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(user)
    });

    const data = await res.json();
    document.getElementById("loading").style.display = "none";
    renderMatches(data.matches, data.user);

    document.getElementById("results-section").style.display = "block";
    document.getElementById("results-section").scrollIntoView({ behavior: "smooth" });
  }
</script>
</body>
</html>
